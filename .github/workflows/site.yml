name: Site

# Publishes the static landing page (site/) to the ROOT of the gh-pages branch.
# `keep_files: true` preserves the Rust docs published under gh-pages/doc by the
# Docs workflow — the two coexist. Both workflows share the `pages` concurrency
# group so they never push to the branch at the same time.

on:
  push:
    branches: [main, master]
    paths:
      - "site/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      # Fetch the self-hosted web fonts at deploy time, so the published site
      # carries them (no external Google Fonts call for visitors) without the
      # binary .woff2 files needing to be committed to the repo. If they are
      # already committed, this simply refreshes them.
      - name: Fetch self-hosted fonts
        run: bash site/assets/fonts/fetch-fonts.sh
      - name: Publish site to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true
